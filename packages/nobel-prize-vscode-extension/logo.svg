<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="50%" style="stop-color:#16213e"/>
      <stop offset="100%" style="stop-color:#0f3460"/>
    </linearGradient>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f5af19"/>
      <stop offset="50%" style="stop-color:#f7d06b"/>
      <stop offset="100%" style="stop-color:#c8a415"/>
    </linearGradient>
    <linearGradient id="ribbon" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e74c3c"/>
      <stop offset="100%" style="stop-color:#c0392b"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="shadow">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#000" flood-opacity="0.3"/>
    </filter>
  </defs>
  
  <!-- Background -->
  <rect width="256" height="256" rx="32" fill="url(#bg)"/>
  
  <!-- Subtle grid pattern -->
  <g opacity="0.05">
    <line x1="0" y1="64" x2="256" y2="64" stroke="white" stroke-width="0.5"/>
    <line x1="0" y1="128" x2="256" y2="128" stroke="white" stroke-width="0.5"/>
    <line x1="0" y1="192" x2="256" y2="192" stroke="white" stroke-width="0.5"/>
    <line x1="64" y1="0" x2="64" y2="256" stroke="white" stroke-width="0.5"/>
    <line x1="128" y1="0" x2="128" y2="256" stroke="white" stroke-width="0.5"/>
    <line x1="192" y1="0" x2="192" y2="256" stroke="white" stroke-width="0.5"/>
  </g>
  
  <!-- Ribbon -->
  <path d="M108 36 L128 56 L148 36" fill="none" stroke="url(#ribbon)" stroke-width="8" stroke-linecap="round"/>
  <line x1="128" y1="56" x2="128" y2="72" stroke="url(#ribbon)" stroke-width="4"/>
  
  <!-- Medal outer ring -->
  <circle cx="128" cy="115" r="52" fill="none" stroke="url(#gold)" stroke-width="4" filter="url(#glow)"/>
  <circle cx="128" cy="115" r="46" fill="none" stroke="url(#gold)" stroke-width="1.5" opacity="0.6"/>
  
  <!-- Medal inner fill -->
  <circle cx="128" cy="115" r="43" fill="url(#bg)" stroke="url(#gold)" stroke-width="0.5"/>
  
  <!-- Star burst inside medal -->
  <g transform="translate(128,115)" fill="url(#gold)" opacity="0.9" filter="url(#glow)">
    <polygon points="0,-22 5,-8 20,-8 8,2 12,18 0,10 -12,18 -8,2 -20,-8 -5,-8"/>
  </g>
  
  <!-- Small decorative dots around medal -->
  <g fill="url(#gold)" opacity="0.4">
    <circle cx="128" cy="58" r="2"/>
    <circle cx="162" cy="68" r="1.5"/>
    <circle cx="182" cy="95" r="1.5"/>
    <circle cx="185" cy="125" r="1.5"/>
    <circle cx="172" cy="152" r="1.5"/>
    <circle cx="148" cy="168" r="2"/>
    <circle cx="108" cy="168" r="2"/>
    <circle cx="84" cy="152" r="1.5"/>
    <circle cx="71" cy="125" r="1.5"/>
    <circle cx="74" cy="95" r="1.5"/>
    <circle cx="94" cy="68" r="1.5"/>
  </g>

  <!-- "NOBEL PRIZE" text -->
  <text x="128" y="194" text-anchor="middle" font-family="'Georgia', 'Times New Roman', serif" font-size="18" font-weight="bold" fill="url(#gold)" letter-spacing="3" filter="url(#shadow)">NOBEL PRIZE</text>
  
  <!-- "MCP SERVER" text -->
  <text x="128" y="218" text-anchor="middle" font-family="'SF Mono', 'Fira Code', 'Consolas', monospace" font-size="14" font-weight="bold" fill="#53c0f0" letter-spacing="4" filter="url(#shadow)">MCP SERVER</text>
  
  <!-- Bottom accent line -->
  <line x1="68" y1="232" x2="188" y2="232" stroke="url(#gold)" stroke-width="1" opacity="0.4"/>
  
  <!-- Corner accents -->
  <path d="M12 32 L12 12 L32 12" fill="none" stroke="url(#gold)" stroke-width="1.5" opacity="0.3"/>
  <path d="M224 12 L244 12 L244 32" fill="none" stroke="url(#gold)" stroke-width="1.5" opacity="0.3"/>
  <path d="M12 224 L12 244 L32 244" fill="none" stroke="url(#gold)" stroke-width="1.5" opacity="0.3"/>
  <path d="M224 244 L244 244 L244 224" fill="none" stroke="url(#gold)" stroke-width="1.5" opacity="0.3"/>
</svg>
